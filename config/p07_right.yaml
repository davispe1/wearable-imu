dataset:
  root: Human gait and other movements - markers inertial sensors pressure insoles
    force plates/researchdata
  subject: P07
  session: S01
selection:
  task: 2minWalk
  trials:
  - '01'
  - '02'
  - '03'
  leg: right
  nodes:
  - RF
  - RS
  - RT
  - SA
  joints:
    ankle:
    - RF
    - RS
    knee:
    - RS
    - RT
    hip:
    - RT
    - SA
  foot_node: RF
  ref_align_node: RF
sensor_map:
  RF: RF
  RS: RS
  RT: RT
  SA: SA
bin_format:
  fs_high: 256.0
  fs_mag: 64.0
  acc_counts_per_g: 2048.0
  gyr_counts_per_dps: 16.384
  gravity: 9.80665
  mag_range_gauss: 500.0
alignment:
  min_corr: 0.5
  refine: true
segment:
  activity_node: RF
  smooth_s: 0.5
  gyro_rms_threshold_dps: 60.0
  min_gap_s: 1.0
  pad_s: 0.5
  max_segment_s: 150.0
mag_calibration:
  enabled: true
  source_tasks:
  - CalibrationTask
  - TUG
  source_trials:
    CalibrationTask:
    - '01'
    - '02'
    - '03'
    TUG:
    - '01'
    - '02'
  method: ellipsoid
  min_samples: 5000
fusion:
  algorithm: madgwick
  beta: 0.05
  beta_6dof: 0.033
  joint_tau_s: 0.3
  kp: 1.0
  ki: 0.0
  run_modes:
  - 6dof
  - 9dof
  init_static_s: 0.5
output:
  dir: outputs
  data_dir: data
  angles_unit: deg
visualization:
  fps: 60
  default_speed: 1.0
  loop: true
  forward_translation: true
  step_length_frac: 0.45
  anthropometry:
    height_mm: null
    thigh_frac: 0.245
    shank_frac: 0.246
    foot_frac: 0.152
    pelvis_frac: 0.100
    trunk_frac: 0.288
