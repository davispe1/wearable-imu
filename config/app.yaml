# Gait Kinematics — desktop app configuration (recorded-file viewer).
# The app is a front-end over the gaitlib library (single source of truth); see app/.

app:
  # Persistent store for imported sessions + computed results. "~" expands to home.
  data_dir: "~/GaitApp/sessions"
  # Orientation modes the pipeline runs. 6-DOF is primary (yaw-immune sagittal flexion);
  # add "9dof" to also compute a magnetometer-aided angle for comparison (slower).
  run_modes: ["6dof"]
  fusion:
    beta_6dof: 0.033        # Madgwick gain (6-DOF)
    beta_9dof: 0.05         # Madgwick gain (9-DOF)
    joint_tau_s: 0.3        # complementary-filter time constant for joint angles (s)

visualization:
  fps: 60                   # render/animation timer rate
  default_speed: 1.0        # 1.0 = real time
  loop: true                # restart playback at end

anthropometry:
  # Mannequin segment lengths scale from stature (Winter ratios); height comes from the
  # session metadata when known, else this default.
  default_height_m: 1.70
